<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Drive4</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #fafbfc;
        }
        .card {
            border: 1px solid #e2e8f0;
            border-radius: 12px;
        }
        .card-header {
            background: white;
            border-bottom: 1px solid #e2e8f0;
            padding: 1.25rem;
        }
        .card-header h3 {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0;
        }
        .form-control {
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 0.5rem 0.75rem;
        }
        .form-control:focus {
            border-color: #3182ce;
            box-shadow: none;
        }
        .btn-success {
            background: #38a169;
            border: none;
            border-radius: 8px;
            padding: 0.5rem;
            font-weight: 500;
        }
        .btn-success:hover {
            background: #2f855a;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="text-center mb-4">
                    <a href="/" style="text-decoration: none; font-size: 1.75rem; font-weight: 700; color: #1a202c;">Drive4</a>
                </div>
                <div class="card">
                    <div class="card-header text-center">
                        <h3>Вход в аккаунт</h3>
                    </div>
                    <div class="card-body p-4">
                        <form method="POST">
                            {% csrf_token %}
                            {% for field in form %}
                                <div class="mb-3">
                                    <label class="form-label fw-medium">{{ field.label }}</label>
                                    {{ field }}
                                </div>
                            {% endfor %}
                            <button type="submit" class="btn btn-success w-100">Войти</button>
                        </form>
                    </div>
                    <div class="card-footer bg-white text-center p-3 border-top-0">
                        <small>Нет аккаунта? <a href="{% url 'register' %}" style="color: #3182ce; text-decoration: none;">Зарегистрироваться</a></small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
