<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавить автомобиль - Drive4</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Drive4</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Главная</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'profile' %}">Мой профиль</a></li>
                    <li class="nav-item">
                        <form method="post" action="{% url 'logout' %}" style="display: inline;">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-link nav-link">Выйти</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-dark text-white navbar-dark">
                        <h3 class="mb-0">Добавить автомобиль в гараж</h3>
                    </div>
                    <div class="card-body">
                        <form method="post" enctype="multipart/form-data">
                            {% csrf_token %}
                            
                            <div class="mb-3">
                                <label class="form-label">Марка</label>
                                <select name="brand" id="id_brand" class="form-select" required>
                                    <option value="">Выберите марку</option>
                                    {% for brand in brands %}
                                        <option value="{{ brand.id }}">{{ brand.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Модель</label>
                                <select name="model" id="id_model" class="form-select" required>
                                    <option value="">Сначала выберите марку</option>
                                </select>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label class="form-label">Год выпуска</label>
                                        <input type="number" name="year" class="form-control" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label class="form-label">Цвет</label>
                                        <input type="text" name="color" class="form-control">
                                    </div>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Госномер</label>
                                <input type="text" name="license_plate" class="form-control">
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label class="form-label">Объём двигателя (л)</label>
                                        <input type="number" name="engine_volume" class="form-control" step="0.1">
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label class="form-label">Мощность (л.с.)</label>
                                        <input type="number" name="horsepower" class="form-control">
                                    </div>
                                </div>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label class="form-label">Коробка передач</label>
                                        <select name="transmission" class="form-select">
                                            <option value="">Не выбрано</option>
                                            <option value="manual">Механика</option>
                                            <option value="automatic">Автомат</option>
                                            <option value="robot">Робот</option>
                                            <option value="cvt">Вариатор</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label class="form-label">Привод</label>
                                        <select name="drive" class="form-select">
                                            <option value="">Не выбрано</option>
                                            <option value="front">Передний</option>
                                            <option value="rear">Задний</option>
                                            <option value="full">Полный</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Фото автомобиля</label>
                                <input type="file" name="photo" class="form-control" accept="image/*">
                            </div>
                            
                            <button type="submit" class="btn btn-primary w-100">Добавить автомобиль</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const brandSelect = document.getElementById('id_brand');
        const modelSelect = document.getElementById('id_model');
        
        brandSelect.addEventListener('change', function() {
            const brandId = this.value;
            if (brandId) {
                fetch(`/get_models/?brand_id=${brandId}`)
                    .then(response => response.json())
                    .then(data => {
                        modelSelect.innerHTML = '<option value="">Выберите модель</option>';
                        data.forEach(model => {
                            modelSelect.innerHTML += `<option value="${model.id}">${model.name}</option>`;
                        });
                    });
            } else {
                modelSelect.innerHTML = '<option value="">Сначала выберите марку</option>';
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
